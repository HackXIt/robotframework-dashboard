name: Sync fork with upstream

on:
  schedule:
    - cron: "17 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

defaults:
  run:
    shell: bash

concurrency:
  group: sync-upstream-main
  cancel-in-progress: false

jobs:
  sync:
    if: github.repository == 'HackXIt/robotframework-dashboard'
    runs-on: ubuntu-latest
    steps:
      - name: Check out fork main
        uses: actions/checkout@v5
        with:
          ref: main
          fetch-depth: 0
          persist-credentials: true

      - name: Merge upstream main and tags
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git remote add upstream https://github.com/MarketSquare/robotframework-dashboard.git
          git fetch upstream main --tags

          before="$(git rev-parse HEAD)"
          git merge --no-edit upstream/main
          after="$(git rev-parse HEAD)"

          if [ "$before" = "$after" ]; then
            echo "Fork main already contains upstream/main."
          else
            git push origin HEAD:main
          fi

          git push origin --tags
